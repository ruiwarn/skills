# Gemini API 配置
# API Key 优先从环境变量 GEMINI_API_KEY 读取，如未设置则使用下方配置
api_key: ""

# 模型名称
model: "gemini-3-flash-preview"

# 芯片手册配置
# 添加新芯片：在 manuals 下创建文件夹，放入手册文件，然后在此添加配置
# 支持两种文档类型：
#   - reference_manual: 参考手册（寄存器定义、硬件配置等）
#   - api_reference: API 参考文档（驱动库函数接口、使用示例等）
chips:
  RN7326:
    reference_manual: "manuals/RN7326/manual.md"
    description: "RN7326/RN202x 三相计量 SoC"
    aliases:
      - "RN202x"
      - "RN2026"
      - "RN2028"

  V32G410X:
    reference_manual: "manuals/V32G410X/V32G410x参考手册_V1.14.md"
    api_reference: "manuals/V32G410X/V32G410x_API参考文档.md"
    description: "V32G410X 三相计量 SoC"
    aliases:
      - "V32G410"

  # 示例：添加其他芯片
  # STM32F103:
  #   reference_manual: "manuals/STM32F103/manual.md"
